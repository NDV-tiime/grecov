name: Submit to CRAN

on:
  workflow_dispatch:

jobs:
  cran-submission:
    name: Submit R package to CRAN
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Submit R package to CRAN
        uses: coatless-actions/cran-submission@v1
        with:
          pkg-directory: 'r-package'
          error-on: 'warning'
          create-issue: true
